<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
  <style>
    .title { font: bold 42px 'Fira Code', monospace; fill: #FFFFFF; }
    .subtitle { font: 20px 'Fira Code', sans-serif; fill: #9945FF; letter-spacing: 4px; }
    .grid { stroke: #1F2937; stroke-width: 0.5; stroke-dasharray: 4 4; }
    .accent { fill: none; stroke: url(#grad); stroke-width: 2; opacity: 0.7; }
  </style>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9945FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00F0FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#0D1117"/>
  <path class="grid" d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250" />
  <path class="grid" d="M 100,0 L 100,300 M 200,0 L 200,300 M 300,0 L 300,300 M 400,0 L 400,300 M 600,0 L 600,300 M 800,0 L 800,300 M 1000,0 L 1000,300" />
  <path class="accent" d="M 50,150 L 300,150 L 350,200 L 850,200 L 900,100 L 1150,100" />
  <circle cx="350" cy="200" r="4" fill="#00F0FF" />
  <circle cx="900" cy="100" r="4" fill="#9945FF" />
  <text x="100" y="130" class="title">SHREYANSHI SRIVASTAVA</text>
  <text x="100" y="175" class="subtitle">DISTRIBUTED SYSTEMS &amp; BACKEND ARCHITECT</text>
</svg>
